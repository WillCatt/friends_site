<!doctype html>
<html lang="en" class="diary-mode">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>셋이 멜번에서 · Three of us in Melbourne</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { height: auto; min-height: 100%; }
    #root { display: block; }
  </style>
</head>
<body class="diary-mode">
  <div id="root"></div>

  <!-- Supabase config (paste your keys here; see SETUP.md). Loaded BEFORE the
       supabase-js library so the client picks it up. -->
  <script src="supabase-config.js"></script>

  <!-- Supabase JS client (loaded conditionally — if the config above is empty
       we still run, just in localStorage-only mode). -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Infrastructure -->
  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="editable.jsx"></script>

  <!-- Content -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="scrapbook.jsx"></script>
  <script type="text/babel" src="scrapbook-more.jsx"></script>
  <script type="text/babel" src="scrapbook-final.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="diary.jsx"></script>
</body>
</html>
